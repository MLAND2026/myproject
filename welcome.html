<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700&family=Manrope:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-1: #f4f9ff;
            --bg-2: #fff7ef;
            --panel: rgba(255, 255, 255, 0.82);
            --panel-border: rgba(255, 255, 255, 0.9);
            --text-main: #1f2937;
            --text-soft: #4b5563;
            --accent: #1d8f76;
            --accent-2: #ff7a3d;
            --shadow: 0 20px 60px rgba(24, 39, 75, 0.15);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            font-family: "Manrope", "Segoe UI", sans-serif;
            color: var(--text-main);
            background:
                radial-gradient(circle at 12% 18%, rgba(29, 143, 118, 0.22), transparent 40%),
                radial-gradient(circle at 85% 12%, rgba(255, 122, 61, 0.24), transparent 38%),
                linear-gradient(140deg, var(--bg-1), var(--bg-2));
            overflow: hidden;
        }

        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(8px);
            opacity: 0.55;
            z-index: 0;
            animation: drift 9s ease-in-out infinite;
        }

        .orb.one {
            width: 240px;
            height: 240px;
            background: #7de2d1;
            top: -70px;
            right: -50px;
        }

        .orb.two {
            width: 200px;
            height: 200px;
            background: #ffd1b8;
            bottom: -70px;
            left: -45px;
            animation-delay: -3s;
        }

        .card {
            width: min(760px, 100%);
            position: relative;
            z-index: 1;
            background: var(--panel);
            border: 1px solid var(--panel-border);
            border-radius: 28px;
            box-shadow: var(--shadow);
            backdrop-filter: blur(8px);
            padding: clamp(28px, 4vw, 52px);
            animation: riseIn 900ms cubic-bezier(.2, .8, .2, 1) both;
        }

        .tag {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.84rem;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            color: #1d8f76;
            background: rgba(29, 143, 118, 0.12);
            padding: 8px 12px;
            border-radius: 999px;
            font-weight: 700;
            animation: fadeSlide 700ms ease-out 180ms both;
        }

        h1 {
            margin: 18px 0 12px;
            font-family: "Fraunces", Georgia, serif;
            font-size: clamp(2rem, 7vw, 4rem);
            line-height: 1.05;
            letter-spacing: 0.01em;
            animation: fadeSlide 700ms ease-out 300ms both;
        }

        p {
            margin: 0;
            max-width: 56ch;
            font-size: clamp(1rem, 2.2vw, 1.16rem);
            line-height: 1.7;
            color: var(--text-soft);
            animation: fadeSlide 700ms ease-out 420ms both;
        }

        .actions {
            margin-top: 28px;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            animation: fadeSlide 700ms ease-out 540ms both;
        }

        .btn {
            border: 0;
            border-radius: 12px;
            padding: 12px 18px;
            font-size: 0.98rem;
            font-weight: 700;
            text-decoration: none;
            transition: transform 180ms ease, box-shadow 180ms ease, background 180ms ease;
        }

        .btn.primary {
            color: #ffffff;
            background: linear-gradient(120deg, var(--accent), #237ea8);
            box-shadow: 0 12px 28px rgba(29, 143, 118, 0.32);
        }

        .btn.secondary {
            color: var(--text-main);
            background: rgba(255, 255, 255, 0.85);
            border: 1px solid rgba(31, 41, 55, 0.15);
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .btn.primary:hover {
            box-shadow: 0 16px 32px rgba(29, 143, 118, 0.36);
        }

        .highlight {
            color: var(--accent-2);
            font-weight: 700;
        }

        @keyframes riseIn {
            from {
                opacity: 0;
                transform: translateY(22px) scale(0.98);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes fadeSlide {
            from {
                opacity: 0;
                transform: translateY(16px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes drift {
            0%,
            100% {
                transform: translateY(0px) scale(1);
            }

            50% {
                transform: translateY(-14px) scale(1.03);
            }
        }

        @media (max-width: 640px) {
            body {
                padding: 16px;
            }

            .card {
                border-radius: 22px;
                padding: 24px;
            }

            .actions {
                flex-direction: column;
            }

            .btn {
                text-align: center;
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="orb one" aria-hidden="true"></div>
    <div class="orb two" aria-hidden="true"></div>

    <main class="card">
        <span class="tag">Fresh Start</span>
        <h1>Welcome to your <span class="highlight">next chapter</span>.</h1>
        <p>
            Everything is set up and ready to go. This space is designed to feel calm, focused,
            and motivating so you can begin building something meaningful right away.
        </p>
        <div class="actions">
            <a class="btn primary" href="#">Get Started</a>
            <a class="btn secondary" href="#">Learn More</a>
        </div>
    </main>
</body>
</html>
